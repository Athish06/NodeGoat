- id: fixora-wrapper-anonymous
  patterns:
  - pattern-either:
    - pattern: function anonymous(...) { ... }
    - pattern: const anonymous = (...) => { ... }
    - pattern: let anonymous = (...) => { ... }
    - pattern: var anonymous = (...) => { ... }
    - pattern: this.anonymous = (...) => { ... }
    - pattern: this.anonymous = function(...) { ... }
    - pattern: 'anonymous: (...) => { ... }'
    - pattern: 'anonymous: function(...) { ... }'
    - pattern: anonymous(...) { ... }
    - pattern: anonymous = (...) => { ... }
    - pattern: anonymous = function(...) { ... }
  - pattern-either:
    - pattern: fs.writeFile(...)
    - pattern: $OBJ.writeFile(...)
    - pattern: writeFile(...)
  message: '### Path Traversal via `date`


    **Vulnerable Sink:** Passes untrusted data directly to `fs.writeFile`.


    **Live Exploit Vector:**

    ```javascript\n// Target Function: anonymous()\n// Parameter: date\n\n// Attacker
    executes:\nanonymous(date = {"getMonth": () => 100})\n```


    **Outcome:**

    The attacker-controlled date object can be manipulated to produce a malicious
    reportPath, potentially leading to a path traversal vulnerability.


    **Data at Risk (Impact):**

    Attackers can potentially write files to arbitrary locations on the system, leading
    to data tampering or code execution.'
  severity: WARNING
  languages:
  - javascript
  - typescript
  metadata:
    category: security
    technology:
    - javascript
    - typescript
    source: fixora-ai-analysis
    vulnerability_type: Path Traversal
    confidence: MEDIUM
    wrapper_defined_in: test/security/profile-test.js
    wraps:
    - fs.writeFile
    modules_used:
    - fs
    vulnerable_parameter: date
    malicious_payload: '{"getMonth": () => 100}'
    exploit_explanation: The attacker-controlled date object can be manipulated to
      produce a malicious reportPath, potentially leading to a path traversal vulnerability.
    exploit_injected_example: 'anonymous(date = {"getMonth": () => 100})'
    impact_summary: Attackers can potentially write files to arbitrary locations on
      the system, leading to data tampering or code execution.
    cwe:
    - CWE-22
    owasp:
    - A01:2021
