- id: fixora-wrapper-callback-zaproxy-core-htmlreport
  patterns:
  - pattern-either:
    - pattern: callback:zaproxy.core.htmlreport = (...) => { ... }
    - pattern: callback:zaproxy.core.htmlreport = function(...) { ... }
  - pattern-either:
    - pattern: fs.writeFile(...)
    - pattern: $OBJ.writeFile(...)
    - pattern: writeFile(...)
  message: '### Path Traversal via `__dirname`


    **Vulnerable Sink:** Passes untrusted data directly to `fs.writeFile`.


    **Live Exploit Vector:**

    ```javascript\n// Target Function: callback:zaproxy.core.htmlreport()\n// Parameter:
    __dirname\n\n// Attacker executes:\ncallback:zaproxy.core.htmlreport(__dirname
    = ../../../../../etc/passwd)\n```


    **Outcome:**

    The attacker-controlled date can be manipulated to create a malicious reportPath,
    potentially allowing an attacker to write to arbitrary locations on the file system.


    **Data at Risk (Impact):**

    Attackers can potentially overwrite system files or write to sensitive locations,
    leading to data corruption or security breaches.'
  severity: WARNING
  languages:
  - javascript
  - typescript
  metadata:
    category: security
    technology:
    - javascript
    - typescript
    source: fixora-ai-analysis
    vulnerability_type: Path Traversal
    confidence: MEDIUM
    wrapper_defined_in: test/security/profile-test.js
    wraps:
    - fs.writeFile
    modules_used:
    - fs
    vulnerable_parameter: __dirname
    malicious_payload: ../../../../../etc/passwd
    exploit_explanation: The attacker-controlled date can be manipulated to create
      a malicious reportPath, potentially allowing an attacker to write to arbitrary
      locations on the file system.
    exploit_injected_example: callback:zaproxy.core.htmlreport(__dirname = ../../../../../etc/passwd)
    impact_summary: Attackers can potentially overwrite system files or write to sensitive
      locations, leading to data corruption or security breaches.
    cwe:
    - CWE-22
    owasp:
    - A01:2021
