rules:
- id: fixora-wrapper-this-update
  patterns:
  - pattern-either:
    - pattern: this.update = (...) => { ... }
    - pattern: this.update = function(...) { ... }
  - pattern-either:
    - pattern: allocationsCol.update(...)
    - pattern: $OBJ.update(...)
    - pattern: update(...)
  message: '### Insecure Deserialization via `userId`


    **Vulnerable Sink:** Passes untrusted data directly to `allocationsCol.update`.


    **Live Exploit Vector:**

    ```javascript\n// Target Function: this.update()\n// Parameter: userId\n\n// Attacker
    executes:\nthis.update(userId = {"userId": "123"})\n```


    **Outcome:**

    An attacker could manipulate the userId to update arbitrary documents in the database.


    **Data at Risk (Impact):**

    An attacker could potentially update sensitive data in the database, leading to
    data tampering or unauthorized access.'
  severity: WARNING
  languages:
  - javascript
  - typescript
  metadata:
    category: security
    technology:
    - javascript
    - typescript
    source: fixora-ai-analysis
    vulnerability_type: Insecure Deserialization
    confidence: MEDIUM
    wrapper_defined_in: app/data/allocations-dao.js
    wraps:
    - allocationsCol.update
    modules_used:
    - mongodb
    vulnerable_parameter: userId
    malicious_payload: '{"userId": "123"}'
    exploit_explanation: An attacker could manipulate the userId to update arbitrary
      documents in the database.
    exploit_injected_example: 'this.update(userId = {"userId": "123"})'
    impact_summary: An attacker could potentially update sensitive data in the database,
      leading to data tampering or unauthorized access.
- id: fixora-wrapper-this-handlecontributionsupdate
  patterns:
  - pattern-either:
    - pattern: this.handleContributionsUpdate = (...) => { ... }
    - pattern: this.handleContributionsUpdate = function(...) { ... }
  - pattern-either:
    - pattern: eval(...)
    - pattern: $OBJ.eval(...)
  message: '### Command Injection via `req.body.preTax`


    **Vulnerable Sink:** Passes untrusted data directly to `eval`.


    **Live Exploit Vector:**

    ```javascript\n// Target Function: this.handleContributionsUpdate()\n// Parameter:
    req.body.preTax\n\n// Attacker executes:\nthis.handleContributionsUpdate(req.body.preTax
    = 1 + require(''child_process'').exec(''ls''))\n```


    **Outcome:**

    An attacker could inject malicious code, potentially leading to arbitrary command
    execution.


    **Data at Risk (Impact):**

    An attacker could execute arbitrary system commands, leading to a complete compromise
    of the system.'
  severity: ERROR
  languages:
  - javascript
  - typescript
  metadata:
    category: security
    technology:
    - javascript
    - typescript
    source: fixora-ai-analysis
    vulnerability_type: Command Injection
    confidence: HIGH
    wrapper_defined_in: app/routes/contributions.js
    wraps:
    - eval
    modules_used:
    - builtins
    vulnerable_parameter: req.body.preTax
    malicious_payload: 1 + require('child_process').exec('ls')
    exploit_explanation: An attacker could inject malicious code, potentially leading
      to arbitrary command execution.
    exploit_injected_example: this.handleContributionsUpdate(req.body.preTax = 1 +
      require('child_process').exec('ls'))
    impact_summary: An attacker could execute arbitrary system commands, leading to
      a complete compromise of the system.
    cwe:
    - CWE-78
    owasp:
    - A03:2021
- id: fixora-wrapper-this-displayresearch
