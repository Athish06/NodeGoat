    - pattern: $OBJ.get(...)
    - pattern: get(...)
  message: '### SSRF via `req.query.symbol`


    **Vulnerable Sink:** Passes untrusted data directly to `needle.get`.


    **Live Exploit Vector:**

    ```javascript\n// Target Function: this.displayResearch()\n// Parameter: req.query.symbol\n\n//
    Attacker executes:\nthis.displayResearch(req.query.symbol = {"symbol": "http://localhost:8080"})\n```


    **Outcome:**

    An attacker could manipulate the symbol parameter to make requests to internal
    services or bypass firewall rules.


    **Data at Risk (Impact):**

    An attacker could potentially access internal services or bypass security controls,
    leading to unauthorized access or data exfiltration.'
